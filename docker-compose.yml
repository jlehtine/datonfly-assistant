services:
    postgres:
        image: postgres:18
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: datonfly
            POSTGRES_PASSWORD: datonfly
            POSTGRES_DB: datonfly
        volumes:
            - pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U datonfly -d datonfly"]
            interval: 5s
            timeout: 5s
            retries: 5

    qdrant:
        image: qdrant/qdrant:v1.17
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrantdata:/qdrant/storage
        healthcheck:
            test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
            interval: 5s
            timeout: 5s
            retries: 5

    tei:
        image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
        ports:
            - "8080:80"
        volumes:
            - teidata:/data
        command: --model-id BAAI/bge-large-en-v1.5

volumes:
    pgdata:
    qdrantdata:
    teidata:
