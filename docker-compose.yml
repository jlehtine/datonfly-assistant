services:
    postgres:
        image: postgres:18
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: datonfly
            POSTGRES_PASSWORD: datonfly
            POSTGRES_DB: datonfly
        volumes:
            - pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U datonfly -d datonfly"]
            interval: 5s
            timeout: 5s
            retries: 5

    qdrant:
        image: qdrant/qdrant:v1.17
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - qdrantdata:/qdrant/storage
        healthcheck:
            test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
            interval: 5s
            timeout: 5s
            retries: 5

    infinity:
        image: michaelf34/infinity:0.0.77
        ports:
            - "8080:8080"
        volumes:
            - infinitydata:/app/.cache
        command: v2 --model-id BAAI/bge-m3 --port 8080
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 120s

volumes:
    pgdata:
    qdrantdata:
    infinitydata:
